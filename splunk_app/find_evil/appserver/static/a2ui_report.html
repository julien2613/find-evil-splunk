<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Find Evil — A2UI Report</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; padding:24px; background:#0d0d12; color:#e0e0ff;
           font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    .a2-col { display:flex; flex-direction:column; gap:14px; }
    .a2-row { display:flex; flex-direction:row; gap:14px; flex-wrap:wrap; }
    .a2-card { border:1px solid #2a2a35; border-radius:12px; padding:16px; background:#16161e; flex:1; min-width:160px; }
    .a2-list { display:flex; flex-direction:column; gap:8px; }
    .a2-h1 { font-size:26px; font-weight:700; margin:0; }
    .a2-h2 { font-size:18px; font-weight:600; margin:10px 0 4px; color:#9cf; }
    .a2-text { font-size:14px; line-height:1.5; margin:0; white-space:pre-wrap; }
    .verdict { font-size:22px; font-weight:800; }
    .sev-critical { border-left:4px solid #ff5b5b; }
    .sev-high { border-left:4px solid #ff9d3c; }
    .sev-medium { border-left:4px solid #ffe03c; }
    .sev-informational, .sev-low, .sev-unknown { border-left:4px solid #3a506b; }
    .badge { display:inline-block; padding:8px 14px; border-radius:8px; background:#3a0d0d; color:#ff5b5b; font-weight:700; }
    .status { color:#8a8a9a; font-size:13px; margin-bottom:16px; }
    a { color:#9cf; }
  </style>
</head>
<body>
  <div class="status" id="status">Chargement du rapport A2UI…</div>
  <div id="surface"></div>

  <script>
    // Source A2UI (serveur a2ui_server.py). Surchargeable via ?src=
    var params = new URLSearchParams(location.search);
    var SRC = params.get("src") || "http://localhost:8801/a2ui/forensic_report";

    // --- Renderer A2UI : composants abstraits -> HTML ---
    function renderComponent(id, map) {
      var c = map[id];
      if (!c) return document.createComment("missing:" + id);
      var type = c.component;
      var el;
      if (type === "Column") {
        el = document.createElement("div"); el.className = "a2-col";
        (c.children || []).forEach(function(cid){ el.appendChild(renderComponent(cid, map)); });
      } else if (type === "Row") {
        el = document.createElement("div"); el.className = "a2-row";
        (c.children || []).forEach(function(cid){ el.appendChild(renderComponent(cid, map)); });
      } else if (type === "List") {
        el = document.createElement("div"); el.className = "a2-list";
        (c.children || []).forEach(function(cid){ el.appendChild(renderComponent(cid, map)); });
      } else if (type === "Card") {
        el = document.createElement("div"); el.className = "a2-card";
        if (c.child) el.appendChild(renderComponent(c.child, map));
        (c.children || []).forEach(function(cid){ el.appendChild(renderComponent(cid, map)); });
      } else if (type === "Text") {
        // variant ∈ {h1..h5, caption, body} (catalogue A2UI v0.9).
        var variant = c.variant || "body";
        var hm = /^h([1-5])$/.exec(variant);
        if (hm) { el = document.createElement("h" + hm[1]); el.className = "a2-h" + (hm[1] <= 2 ? hm[1] : "2"); }
        else { el = document.createElement("p"); el.className = "a2-text"; }
        var txt = typeof c.text === "object" ? JSON.stringify(c.text) : (c.text || "");
        // Le texte A2UI supporte le markdown nativement.
        if (hm) { el.textContent = txt; } else { el.innerHTML = miniMarkdown(txt); }
        if (id === "verdict_text") {
          el.className += " verdict";
          var b = document.createElement("span"); b.className = "badge"; b.textContent = txt;
          el.textContent = ""; el.appendChild(b);
        }
      } else {
        el = document.createElement("div"); el.textContent = "[" + type + "]";
      }
      return el;
    }

    // Markdown minimal (titres, gras, listes, sauts de ligne)
    function miniMarkdown(s) {
      var esc = s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      return esc
        .replace(/^### (.*)$/gm, "<b>$1</b>")
        .replace(/^## (.*)$/gm, "<b style='color:#9cf'>$1</b>")
        .replace(/^# (.*)$/gm, "<b style='color:#9cf;font-size:16px'>$1</b>")
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/^- (.*)$/gm, "• $1")
        .replace(/\n/g, "<br/>");
    }

    // --- Parse du flux JSONL A2UI ---
    function processA2UI(text) {
      var map = {}, root = null, surface = null;
      text.split("\n").forEach(function(line){
        line = line.trim(); if (!line) return;
        var msg; try { msg = JSON.parse(line); } catch(e){ return; }
        if (msg.createSurface) surface = msg.createSurface.surfaceId;
        if (msg.updateComponents) {
          var uc = msg.updateComponents;
          if (uc.root) root = uc.root;
          (uc.components || []).forEach(function(comp){ map[comp.id] = comp; });
          if (!root && map["root"]) root = "root";
        }
        if (msg.deleteSurface) { map = {}; root = null; }
      });
      return { map: map, root: root };
    }

    fetch(SRC)
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
      .then(function(text){
        var parsed = processA2UI(text);
        var surface = document.getElementById("surface");
        surface.innerHTML = "";
        if (parsed.root) surface.appendChild(renderComponent(parsed.root, parsed.map));
        var n = Object.keys(parsed.map).length;
        document.getElementById("status").textContent =
          "Rapport A2UI rendu — " + n + " composants reçus du serveur agent (protocole Agent-to-UI v0.9).";
      })
      .catch(function(e){
        document.getElementById("status").innerHTML =
          "⚠ Impossible de charger le rapport A2UI depuis <code>" + SRC + "</code> : " + e.message +
          ".<br/>Démarre le serveur : <code>uvicorn a2ui_server:app --port 8801</code> (dossier web/a2ui).";
      });
  </script>
</body>
</html>
