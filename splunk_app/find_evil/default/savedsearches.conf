# Automated SOC workflow: Detect -> Investigate (AI) -> Automate (incident)
# Detects critical YARA detections, runs AI triage via the | ai command of the
# Splunk AI Toolkit, and writes a notable incident into the forensics index.

[Find Evil - Auto Triage Workflow]
description = Automated SOC workflow: detects critical YARA detections on the DC, triggers AI triage (| ai -> Claude), and writes a notable incident (sourcetype=forensics:incident). Detect -> Investigate -> Automate.
search = index=forensics sourcetype=forensics:yara_hit \
| eval line=severity.": ".signature." (".mitre.")" \
| stats list(line) as dets sum(eval(if(severity="critical",1,0))) as critical_count sum(eval(if(severity="high",1,0))) as high_count \
| eval detections=mvjoin(dets, " | ") \
| fields detections critical_count high_count \
| ai connection="claude" prompt="You are a SOC analyst. Here are the YARA detections on a Windows domain controller: {detections}. Give a concise answer in English: 1) a verdict (COMPROMISED/SUSPICIOUS/CLEAN), 2) the summarized MITRE ATT&CK kill-chain, 3) three prioritized remediation actions." \
| rename ai_result_1 as ai_analysis \
| eval verdict=case(match(ai_analysis,"(?i)COMPROMIS"),"COMPROMISED",match(ai_analysis,"(?i)SUSPIC"),"SUSPICIOUS",1=1,"CLEAN"), host="base-dc-memory.img", source="find_evil:auto_triage" \
| where critical_count > 0 \
| table _time host verdict critical_count high_count ai_analysis source \
| collect index=forensics sourcetype=forensics:incident
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
cron_schedule = */30 * * * *
counttype = number of results
relation = greater than
quantity = 0
alert_type = number of results
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 5
alert.suppress = 0
actions =
request.ui_dispatch_app = find_evil
request.ui_dispatch_view = soc_incidents
