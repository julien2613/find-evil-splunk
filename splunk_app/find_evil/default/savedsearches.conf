# Workflow SOC automatisé : Détecter -> Investiguer (IA) -> Automatiser (incident)
# Détecte les détections YARA critiques, lance le triage IA via la commande | ai
# du Splunk AI Toolkit, et écrit un incident notable dans l'index forensics.

[Find Evil - Auto Triage Workflow]
description = Workflow SOC automatisé : détecte les détections YARA critiques sur le DC, déclenche le triage IA (| ai -> Claude), et écrit un incident notable (sourcetype=forensics:incident). Détecter -> Investiguer -> Automatiser.
search = index=forensics sourcetype=forensics:yara_hit \
| eval line=severity.": ".signature." (".mitre.")" \
| stats list(line) as dets sum(eval(if(severity="critical",1,0))) as critical_count sum(eval(if(severity="high",1,0))) as high_count \
| eval detections=mvjoin(dets, " | ") \
| fields detections critical_count high_count \
| ai connection="claude" prompt="Tu es analyste SOC. Voici les detections YARA sur un controleur de domaine Windows: {detections}. Donne en francais et concis: 1) un verdict (COMPROMIS/SUSPECT/RAS), 2) la kill-chain MITRE ATT&CK resumee, 3) trois actions de remediation prioritaires." \
| rename ai_result_1 as ai_analysis \
| eval verdict=case(match(ai_analysis,"(?i)COMPROMIS"),"COMPROMIS",match(ai_analysis,"(?i)SUSPECT"),"SUSPECT",1=1,"RAS"), host="base-dc-memory.img", source="find_evil:auto_triage" \
| where critical_count > 0 \
| table _time host verdict critical_count high_count ai_analysis source \
| collect index=forensics sourcetype=forensics:incident
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
cron_schedule = */30 * * * *
counttype = number of results
relation = greater than
quantity = 0
alert_type = number of results
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 5
alert.suppress = 0
actions =
request.ui_dispatch_app = find_evil
request.ui_dispatch_view = soc_incidents
