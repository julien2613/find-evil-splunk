# CIM tags → datamodels:
#   forensics:process   -> Endpoint.Processes  (tag=process)
#   forensics:yara_hit  -> Alerts              (tag=alert)
# Field names already follow CIM (process_name, process_id, parent_process_id, dest,
# signature, severity), so the events map directly into these datamodels.

[eventtype=forensics_endpoint_process]
process = enabled

[eventtype=forensics_alert_detection]
alert = enabled
