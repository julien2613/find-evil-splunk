# JSON events ingested via the official splunk-sdk-python (Index.attached_socket -> receivers/stream).
# - INDEXED_EXTRACTIONS=json: Splunk parses the JSON and extracts fields at index time.
# - SHOULD_LINEMERGE=false: one JSON object per line = one event (explicit, no line merging).
# - _time extracted from the event_time field (the evidence dates from 2018 -> high MAX_DAYS_AGO,
#   otherwise Splunk rejects the date and uses the index time).
# - KV_MODE=none + AUTO_KV_JSON=false: no re-extraction at search time (avoids duplicates).

[forensics:process]
INDEXED_EXTRACTIONS = json
SHOULD_LINEMERGE = false
TIMESTAMP_FIELDS = event_time
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
MAX_DAYS_AGO = 4000
KV_MODE = none
AUTO_KV_JSON = false

