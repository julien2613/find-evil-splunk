# Événements JSON ingérés via le SDK Python (index.attached_socket).
# - INDEXED_EXTRACTIONS=json : Splunk parse le JSON et extrait les champs à l'indexation.
# - _time extrait du champ event_time (l'évidence date de 2018 -> MAX_DAYS_AGO élevé,
#   sinon Splunk rejette la date et met l'heure d'indexation).
# - KV_MODE=none + AUTO_KV_JSON=false : pas de ré-extraction au search-time (évite les doublons).

[forensics:process]
INDEXED_EXTRACTIONS = json
TIMESTAMP_FIELDS = event_time
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
MAX_DAYS_AGO = 4000
KV_MODE = none
AUTO_KV_JSON = false

