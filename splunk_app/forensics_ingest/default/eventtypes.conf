# CIM modeling — these eventtypes are tagged in tags.conf so the forensic data
# populates the Splunk Common Information Model datamodels (Endpoint.Processes, Alerts),
# making it queryable via | datamodel / | tstats and reusable by CIM-based content.

[forensics_endpoint_process]
search = sourcetype=forensics:process

[forensics_alert_detection]
search = sourcetype=forensics:yara_hit
