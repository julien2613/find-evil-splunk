# Clean Splunk Enterprise in a container, to test the Terraform deployment from scratch.
#
#   1) python3 ../terraform/package.py          # build ../terraform/dist/*.spl (bind-mounted below)
#   2) SPLUNK_PASSWORD='Changeme123' docker compose up -d   # ~5-10 min on Apple Silicon (amd64 emulation)
#   3) cd ../terraform && terraform init && \
#      SPLUNK_USERNAME=admin SPLUNK_PASSWORD='Changeme123' \
#      terraform apply -var splunk_url=localhost:18089 -var splunk_web_url=http://localhost:18000 -var spl_dir=/spl
#   4) open http://localhost:18000  (admin / your password)
#   5) docker compose down -v
#
# Note: the image is amd64-only -> emulated (slow) on arm64. The MCP Server / AI Toolkit are
# NOT in the image, so the live agent / | ai won't run here — but the Terraform deploy (index +
# both apps) and the A2UI dashboards (which render bundled snapshots) ARE validated on a clean instance.

services:
  splunk:
    image: splunk/splunk:latest
    platform: linux/amd64
    container_name: find-evil-splunk
    hostname: splunk
    environment:
      # Recent images require BOTH the general-terms and the start-args license flags.
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD:?set SPLUNK_PASSWORD (>= 8 chars)}
    ports:
      - "18000:8000" # Splunk Web
      - "18089:8089" # management / REST (Terraform target)
    volumes:
      # The packaged apps, readable by splunkd at /spl (matches `terraform apply -var spl_dir=/spl`).
      - ../terraform/dist:/spl:ro
    # The image ships its own healthcheck (/sbin/checkstate.sh) — don't override it
    # (a curl-based check fails: curl isn't in the image). `docker compose up` reports
    # "healthy" once Splunk is fully provisioned.
